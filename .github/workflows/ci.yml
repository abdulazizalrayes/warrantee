name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://erptubrslnfmkuouczgn.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_for_ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: placeholder_for_ci
          NEXT_PUBLIC_APP_URL: https://warrantee.io
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder_for_ci
