<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#D4AF37" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Shield body -->
  <path d="M256 28 L462 100 C462 100 472 300 256 484 C40 300 50 100 50 100 Z" fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="12" filter="url(#shadow)"/>
  <!-- Inner shield border -->
  <path d="M256 60 L432 122 C432 122 440 290 256 452 C72 290 80 122 80 122 Z" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.5"/>
  <!-- Checkmark / W letterform -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="240" fill="url(#goldGrad)" letter-spacing="-10">W</text>
</svg>
